name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Écriture du cache activée sur toutes les branches :
          # - La branche hérite du cache de main au 1er build (fallback automatique)
          # - Elle écrit ensuite son propre cache pour les builds suivants
          cache-read-only: false
          gradle-home-cache-cleanup: true
          # Génère le graphe de dépendances pour accélérer la résolution future
          dependency-graph: generate-and-submit
          # Build Scan pour diagnostiquer les performances et voir les cache hits
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/terms-of-service"
          build-scan-terms-of-use-agree: "yes"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and Check Code Style
        run: ./gradlew ktlintCheck build --build-cache --configuration-cache --console=plain
