name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Parametres Gradle communs injectes dans tous les jobs via l'env
env:
  GRADLE_COMMON_ARGS: "--build-cache --no-configuration-cache --parallel --console=plain"

jobs:
  lint:
    name: KtLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          cache-cleanup: on-success
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          gradle-home-cache-strict-match: false
          gradle-home-cache-includes: |
            caches
            notifications
            init.d
          gradle-home-cache-excludes: |
            caches/modules-*/files-*/com.google.android.gms
            caches/modules-*/files-*/com.android.tools*
            caches/transforms-*/!*.jar

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run KtLint
        run: ./gradlew ktlintCheck ${{ env.GRADLE_COMMON_ARGS }}

  android-build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          cache-cleanup: on-success
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          gradle-home-cache-strict-match: false
          gradle-home-cache-includes: |
            caches
            notifications
            init.d
          gradle-home-cache-excludes: |
            caches/modules-*/files-*/com.google.android.gms
            caches/modules-*/files-*/com.android.tools*
            caches/transforms-*/!*.jar
          dependency-graph: ${{ github.event_name == 'push' && 'generate-and-submit' || 'disabled' }}
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/terms-of-service"
          build-scan-terms-of-use-agree: "yes"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug & Unit Tests
        run: ./gradlew assembleDebug testDebugUnitTest ${{ env.GRADLE_COMMON_ARGS }}

  # Job agregateur : correspond au check "build" attendu par la branch protection rule de main
  build:
    name: Build Status
    runs-on: ubuntu-latest
    needs: [ lint, android-build ]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || [ "${{ needs.android-build.result }}" != "success" ]; then
            echo "One or more jobs failed: lint=${{ needs.lint.result }}, build=${{ needs.android-build.result }}"
            exit 1
          fi
          echo "All jobs passed successfully"

