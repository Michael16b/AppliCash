name: Android CI

on:
    push:
        branches: [ "main" ]
    pull_request:
        branches: [ "main" ]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: set up JDK 21
              uses: actions/setup-java@v4
              with:
                  java-version: '21'
                  distribution: 'temurin'

            - name: Setup Gradle (with KMP cache)
              uses: gradle/actions/setup-gradle@v3


            - name: Check Code Style (Ktlint)
              run: ./gradlew ktlintCheck --build-cache --configuration-cache --configuration-cache-problems=warn --no-daemon --console=plain


            - name: Build Android app only
              run: ./gradlew :app:assembleDebug --build-cache --configuration-cache --configuration-cache-problems=warn --no-daemon --console=plain
