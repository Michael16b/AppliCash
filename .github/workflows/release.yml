name: CI Release Pipeline (minimal)

on:
  push:
    branches: ["main"]
    tags: ['v*']
  pull_request:
    branches: ["main"]
  workflow_dispatch: {}

env:
  CI_DIR: .ci
  PACKAGE_NAME: com.applicash.app

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Create CI dir
        run: |
          mkdir -p ${{ env.CI_DIR }}
          chmod 700 ${{ env.CI_DIR }}

      - name: Restore keystore (from base64 secret)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > ${{ env.CI_DIR }}/keystore.jks
          chmod 600 ${{ env.CI_DIR }}/keystore.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build signed Release APK (when keystore available)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_PATH: ${{ env.CI_DIR }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew clean assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=${KEYSTORE_PATH} \
            -Pandroid.injected.signing.store.password=${KEYSTORE_PASSWORD} \
            -Pandroid.injected.signing.key.alias=${KEY_ALIAS} \
            -Pandroid.injected.signing.key.password=${KEY_PASSWORD}

      - name: Build Debug APK (for PRs/forks without keystore)
        if: ${{ secrets.KEYSTORE_BASE64 == '' }}
        run: |
          ./gradlew clean assembleDebug --no-daemon

      - name: Find APK
        id: find_apk
        run: |
          set -e
          # Prefer release APK, fall back to debug
          APK=$(ls app/build/outputs/apk/release/*.apk 2>/dev/null | head -n1 || true)
          if [ -z "$APK" ]; then
            APK=$(ls app/build/outputs/apk/debug/*.apk 2>/dev/null | head -n1 || true)
          fi
          if [ -z "$APK" ]; then
            echo "No APK found" >&2
            exit 1
          fi
          echo "apk=$APK" >> $GITHUB_OUTPUT

      - name: Copy APK to standard name Applicash.apk
        id: copy_apk
        run: |
          mkdir -p ${{ env.CI_DIR }}
          SRC=${{ steps.find_apk.outputs.apk }}
          DST=${{ env.CI_DIR }}/Applicash.apk
          cp "$SRC" "$DST"
          echo "dst=$DST" >> $GITHUB_OUTPUT

      - name: Verify APK signature (apksigner)
        run: |
          APK_PATH=${{ steps.copy_apk.outputs.dst }}
          echo "Verifying $APK_PATH"
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -V | tail -n1)/apksigner verify --print-certs "$APK_PATH" || true

      - name: Upload APK artifact (Applicash.apk)
        uses: actions/upload-artifact@v4
        with:
          name: Applicash
          path: ${{ env.CI_DIR }}/Applicash.apk

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: "Automated release from CI"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ env.CI_DIR }}/Applicash.apk
          asset_name: Applicash.apk
          asset_content_type: application/vnd.android.package-archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
