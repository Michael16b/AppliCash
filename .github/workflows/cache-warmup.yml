name: Cache Warm-up

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
  workflow_run:
    workflows: [ "Android CI" ]
    branches: [ "main" ]
    types: [ completed ]

permissions:
  contents: read
  actions: write

env:
  GRADLE_COMMON_ARGS: "--build-cache --configuration-cache --parallel --console=plain"

jobs:
  warmup-lint:
    name: Warm-up KtLint cache
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          cache-cleanup: on-success
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          gradle-home-cache-excludes: |
            caches/modules-*/files-*/com.google.android.gms
            caches/modules-*/files-*/com.android.tools*
            caches/transforms-*/!*.jar

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Warm-up KtLint
        run: ./gradlew ktlintCheck ${{ env.GRADLE_COMMON_ARGS }}

  warmup-build:
    name: Warm-up Build cache
    runs-on: ubuntu-latest
    needs: warmup-lint
    if: ${{ always() && (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success') }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          cache-cleanup: on-success
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          gradle-home-cache-excludes: |
            caches/modules-*/files-*/com.google.android.gms
            caches/modules-*/files-*/com.android.tools*
            caches/transforms-*/!*.jar

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Warm-up Build & Test cache
        run: ./gradlew assembleDebug testDebugUnitTest ${{ env.GRADLE_COMMON_ARGS }}
