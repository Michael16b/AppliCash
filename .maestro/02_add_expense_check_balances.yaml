appId: fr.univ.nantes.archi
name: "Scenario 2 - Add expense and verify balances"
tags:
  - rg4
  - rg14
  - ca14
  - ca15
  - ca16

# Business rules verified:
# RG4:  An expense requires an amount > 0
# RG10: Balances are calculated from all group expenses
# RG11: Form validates before submission (amount, description)
# RG12: Error messages display correctly
# RG14: Authentication required to add an expense

---

# Setup: launch with existing state (group already created by scenario 1)
- launchApp:
    clearState: false

- waitForAnimationToEnd:
    timeout: 5000

# Navigate into the "Weekend Trip" group
- tapOn:
    text: "Weekend Trip"

- waitForAnimationToEnd:
    timeout: 3000

# Verify we see the group detail screen (tab bar with Expenses / Balances)
- assertVisible:
    text: "Expenses"

# RG14: Verify "Add an expense" button is visible
- assertVisible:
    text: "Add an expense"

- tapOn:
    text: "Add an expense"

- waitForAnimationToEnd:
    timeout: 3000

# RG4: Validate - zero amount shows error
# We land on AddExpenseScreen
- assertVisible:
    text: "Nouvelle dépense"

- tapOn:
    text: "Ajouter la dépense"

# CA17: Error state - amount is empty
- assertVisible:
    text: "Montant"

# Enter valid expense details
- tapOn:
    text: "Titre de la dépense"
- clearText
- inputText: "Hotel"

- tapOn:
    text: "Montant"
- clearText
- inputText: "90"

# Payer is pre-selected (Alice logged in) - verify dropdown shows Alice
- assertVisible:
    text: "Alice"

# Submit the expense
- tapOn:
    text: "Ajouter la dépense"

- waitForAnimationToEnd:
    timeout: 3000

# Back to group detail - verify expense appears
- assertVisible:
    text: "Hotel"

- takeScreenshot: "scenario2_expense_added"

# Add a second expense (paid by Bob) to verify multi-expense balances
- tapOn:
    text: "Add an expense"

- waitForAnimationToEnd:
    timeout: 3000

- tapOn:
    text: "Titre de la dépense"
- clearText
- inputText: "Food"

- tapOn:
    text: "Montant"
- clearText
- inputText: "30"

# Change payer to Bob
- tapOn:
    text: "Alice"
    optional: true
- tapOn:
    text: "Bob"
    optional: true

- tapOn:
    text: "Ajouter la dépense"

- waitForAnimationToEnd:
    timeout: 3000

# Navigate to Balances tab
- tapOn:
    text: "Balances"

- waitForAnimationToEnd:
    timeout: 2000

# CA17: Verify balances screen loaded
- assertVisible:
    text: "Member balances"

# RG10: With Hotel=90 (Alice) and Food=30 (Bob), total=120, share=40 each
# Alice paid 90, owes 40 => net +50 (should receive)
# Bob paid 30, owes 40 => net -10 (should reimburse)
# Charlie paid 0, owes 40 => net -40 (should reimburse)
- assertVisible:
    text: "Alice"

- assertVisible:
    text: "Bob"

- assertVisible:
    text: "Suggested reimbursements"

- takeScreenshot: "scenario2_balances_verified"
