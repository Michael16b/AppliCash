name: Maestro E2E Tests (Self-Hosted Oracle AMD)

on:
    push:
        branches: [ "main" ]
    pull_request:
        branches: [ "main" ]
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read
    checks: write

env:
    GRADLE_COMMON_ARGS: "--build-cache --no-configuration-cache --parallel --console=plain"

jobs:
    maestro-e2e:
        name: Maestro E2E - Scenario Tests
        runs-on: self-hosted
        timeout-minutes: 60

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            # ── Java Setup ──────────────────────────────────────────────────────────
            - name: Set up JDK 21
              id: setup-java
              uses: actions/setup-java@v4
              with:
                  java-version: '21'
                  distribution: 'temurin'

            # ── FORCE GRADLE TOOLCHAIN OVERRIDE ──────────────────────────────────────
            - name: Force Gradle to use Temurin JDK
              run: |
                  echo "org.gradle.java.home=${{ steps.setup-java.outputs.path }}" >> gradle.properties
                  echo "org.gradle.java.installations.auto-download=false" >> gradle.properties
                  echo "org.gradle.java.installations.auto-detect=false" >> gradle.properties
                  cat gradle.properties

            # ── Gradle Setup & Cache ────────────────────────────────────────────────
            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v4
              with:
                  cache-read-only: false
                  cache-cleanup: on-success

            - name: Grant execute permission for gradlew
              run: chmod +x gradlew

            # ── Build APK ───────────────────────────────────────────────────
            - name: Build Debug APK
              run: ./gradlew assembleDebug ${{ env.GRADLE_COMMON_ARGS }}

            # ── Maestro Setup ───────────────────────────────────────────────────────
            - name: Install Maestro CLI
              run: |
                  curl -Ls "https://get.maestro.mobile.dev" | bash
                  echo "$HOME/.maestro/bin" >> $GITHUB_PATH

            # ── KVM & Dependencies ──────────────────────────────────────────────────
            - name: Enable KVM
              run: |
                  sudo usermod -aG kvm $USER
                  echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
                    | sudo tee /etc/udev/rules.d/99-kvm4all.rules
                  sudo udevadm control --reload-rules
                  sudo udevadm trigger --name-match=kvm
                  sudo apt-get update -qq
                  sudo apt-get install -y --no-install-recommends libpulse0 libasound2-plugins libgl1 libx11-6

            # ── Start Android Emulator & Run E2E Tests ──────────────────────────────
            - name: Start Android Emulator and run Maestro
              uses: reactivecircus/android-emulator-runner@v2
              with:
                  api-level: 29
                  # Since you are on AMD, we use x86_64
                  arch: x86_64
                  target: google_apis
                  profile: pixel_3a
                  avd-name: maestro_test_device
                  # WARNING: 1GB RAM instances will likely fail here
                  ram-size: 2048M
                  heap-size: 256M
                  emulator-boot-timeout: 120
                  emulator-options: >-
                      -no-window -no-snapshot -no-audio -no-boot-anim -gpu swiftshader_indirect
                  disable-animations: true
                  script: |
                      adb install -r app/build/outputs/apk/debug/app-debug.apk
                      mkdir -p .maestro/results
                      for scenario in .maestro/*.yaml; do
                        timeout 300 maestro test "$scenario" --
