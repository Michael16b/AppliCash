name: CI - Tests & Coverage

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 2 * * *' # Nightly at 02:00 UTC for instrumented UI tests

jobs:
  unit-tests:
    name: Run unit tests and generate coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper/
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run unit tests and generate aggregated coverage
        run: ./gradlew testAll jacocoAggregate jacocoHtmlAggregate coverageEnforce --no-daemon --stacktrace

      - name: Upload module-level coverage HTML reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-html
          path: '**/build/reports/jacoco/html/**'

      - name: Upload aggregated coverage HTML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-aggregate
          path: build/reports/jacoco/html/**

  publish-pages:
    name: Publish coverage to GitHub Pages
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download aggregated coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report-aggregate
          path: site

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site

  nightly-instrumented:
    name: Nightly instrumented UI tests
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Install Android SDK (required for emulator)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: google_apis
          arch: x86_64
          emulator-options: '-no-window -no-audio -no-boot-anim'

      - name: Run instrumented UI tests (Maestro/Espresso)
        run: |
          ./gradlew connectedAndroidTest --no-daemon --stacktrace

      - name: Collect instrumented test reports
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-tests-report
          path: '**/build/reports/androidTests/**'
