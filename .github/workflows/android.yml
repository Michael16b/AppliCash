name: Android CI

on:
    push:
        branches: [ "main" ]
    pull_request:
        branches: [ "main" ]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: set up JDK 21
              uses: actions/setup-java@v4
              with:
                  java-version: '21'
                  distribution: 'temurin'

            - name: Setup Gradle (with KMP cache)
              uses: gradle/actions/setup-gradle@v4
              with:
                  cache-read-only: false


            - name: Build and Check Code Style
              run: ./gradlew ktlintCheck :app:assembleDebug --build-cache --parallel --console=plain
