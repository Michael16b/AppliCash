name: Maestro E2E Tests

on:
    schedule:
        - cron: '0 2 * * *' # Every night at 2 AM UTC
    pull_request:
        branches: [ "main" ]
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read
    checks: write

env:
    GRADLE_COMMON_ARGS: "--build-cache --no-configuration-cache --parallel --console=plain"
    MAESTRO_CLI_NO_ANALYTICS: "1"

jobs:
    maestro-e2e:
        name: Maestro E2E - Scenario Tests
        runs-on: ubuntu-latest
        timeout-minutes: 60

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            # ── Java Setup ──────────────────────────────────────────────────────────
            - name: Set up JDK 21
              id: setup-java
              uses: actions/setup-java@v4
              with:
                  java-version: '21'
                  distribution: 'temurin'

            # ── KILL TOOLCHAIN CONSTRAINTS ──────────────────────────────────────────
            - name: Force JDK and Remove JetBrains constraint
              run: |
                  rm -f gradle/gradle-daemon-jvm.properties
                  echo "org.gradle.java.home=${{ steps.setup-java.outputs.path }}" >> gradle.properties
                  echo "org.gradle.java.installations.auto-download=false" >> gradle.properties
                  echo "org.gradle.java.installations.auto-detect=false" >> gradle.properties
                  echo "--- Resulting gradle.properties ---"
                  cat gradle.properties

            # ── Gradle Setup ────────────────────────────────────────────────────────
            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v4
              with:
                  cache-read-only: false
                  cache-cleanup: on-success

            - name: Grant execute permission for gradlew
              run: chmod +x gradlew

            # ── Build APK ───────────────────────────────────────────────────────────
            - name: Build Debug APK
              run: |
                  ./gradlew assembleDebug \
                    -Dorg.gradle.jvmargs="-Xmx3g -XX:MaxMetaspaceSize=1g" \
                    ${{ env.GRADLE_COMMON_ARGS }}

            # ── Maestro Cache ───────────────────────────────────────────────────────
            - name: Cache Maestro CLI
              id: cache-maestro
              uses: actions/cache@v4
              with:
                path: ~/.maestro
                key: ${{ runner.os }}-maestro

            # ── Maestro Setup ───────────────────────────────────────────────────────
            - name: Install Maestro CLI
              if: steps.cache-maestro.outputs.cache-hit != 'true'
              run: |
                  curl -Ls "https://get.maestro.mobile.dev" | bash

            - name: Add Maestro to Path
              run: echo "$HOME/.maestro/bin" >> $GITHUB_PATH

            # ── KVM & System Dependencies ───────────────────────────────────────────
            - name: Enable KVM and Install Deps
              run: |
                  sudo usermod -aG kvm $USER
                  echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
                    | sudo tee /etc/udev/rules.d/99-kvm4all.rules
                  sudo udevadm control --reload-rules
                  sudo udevadm trigger --name-match=kvm

                  sudo apt-get update -qq
                  sudo apt-get install -y --no-install-recommends \
                    libpulse0 libasound2-plugins libgl1 libx11-6

            # ── Start Android Emulator & Run Tests ──────────────────────────────────
            - name: Start Android Emulator and run Maestro
              uses: reactivecircus/android-emulator-runner@v2
              with:
                  api-level: 29
                  arch: x86_64
                  target: google_apis
                  profile: pixel_3a
                  avd-name: maestro_test_device
                  ram-size: 2048M
                  heap-size: 512M
                  emulator-boot-timeout: 300
                  emulator-options: -no-window -no-snapshot -no-audio -no-boot-anim -gpu swiftshader_indirect
                  disable-animations: true
                  locale: fr_FR
                  script: |
                      adb install -r app/build/outputs/apk/debug/app-debug.apk
                      mkdir -p .maestro/results
                      # Run individual scenarios to get separate reports, excluding the full suite master file
                      for scenario in .maestro/[0-9]*.yaml; do
                        if echo "$scenario" | grep -q "00_full_suite"; then continue; fi
                        echo "Running $scenario..."
                        maestro test "$scenario" --format junit --output ".maestro/results/$(basename "$scenario" .yaml)_results.xml" --no-ansi || echo "Failed: $scenario"
                      done

            # ── Artifacts & Reports ─────────────────────────────────────────────────
            - name: Upload Results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: maestro-results
                  path: .maestro/results/

            - name: Publish Test Results
              if: always()
              uses: mikepenz/action-junit-report@v4
              with:
                  report_paths: ".maestro/results/*.xml"
                  check_name: "Maestro E2E Results"
