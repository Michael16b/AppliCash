appId: fr.univ.nantes.archi
name: "Scenario 1 - Create group and add members"
tags:
  - rg1
  - rg2
  - rg3
  - ca14
  - ca15
  - ca16

# ── Business rules verified ──────────────────────────────────────────────────
# RG1:  A group must have at least 2 members
# RG2:  A member name cannot be empty
# RG3:  Member names must be unique within a group
# RG11: Form validates before submission
# RG12: Error messages are displayed correctly

---

# ── Setup: launch the app fresh ──────────────────────────────────────────────
- launchApp:
    clearState: true

# CA17: Wait for splash/loading screen to finish
- waitForAnimationToEnd:
    timeout: 5000

# ── Register a new user so the app is authenticated ──────────────────────────
# The splash screen redirects to Home; from Home tap the profile icon to reach Login
- tapOn:
    text: "Profile"
    optional: true

- waitForAnimationToEnd:
    timeout: 3000

# If we land on Login, create an account
- tapOn:
    text: "Créer un compte"
    optional: true

- tapOn:
    text: "Email"
- clearText
- inputText: "test@appli.cash"

- tapOn:
    text: "Mot de passe"
- clearText
- inputText: "test1234"

- tapOn:
    text: "Prénom"
- clearText
- inputText: "Alice"

- tapOn:
    text: "Nom"
- clearText
- inputText: "Test"

- tapOn:
    text: "Créer un compte"

# CA17: Wait for navigation to Home after registration
- waitForAnimationToEnd:
    timeout: 5000

# ── Navigate to "Create Group" screen ────────────────────────────────────────
- tapOn:
    id: ".*fab.*|.*add.*|.*plus.*"
    optional: true

# Fallback: tap the + FAB visible on the Home screen
- tapOn:
    text: "Add a group"
    optional: true

- waitForAnimationToEnd:
    timeout: 3000

# Verify we are on the "New Group" screen
- assertVisible:
    text: "New Group"

# ── RG11: Validate — empty group name shows error ────────────────────────────
- tapOn:
    text: "Continue"
    optional: true

- tapOn:
    text: "Create Group"
    optional: true

- assertVisible:
    text: "Group name cannot be empty"

# ── Enter a valid group name ─────────────────────────────────────────────────
- tapOn:
    text: "Group Name"
- clearText
- inputText: "Weekend Trip"

# ── RG2: Validate — blank member name is ignored ─────────────────────────────
# The first field is pre-filled with logged-in user's name (Alice).
# We verify it is already filled by the ViewModel.
- assertVisible:
    text: "Alice"

# ── RG1: Validate — only 1 member shows error ────────────────────────────────
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Create Group"
    optional: true

- assertVisible:
    text: "At least 2 members are required"

# ── Add second member ─────────────────────────────────────────────────────────
- tapOn:
    text: "Add member"

- waitForAnimationToEnd:
    timeout: 1000

# Type in the second member field (last OutlinedTextField with member placeholder)
- tapOn:
    text: "Enter member name"
- inputText: "Bob"

# ── RG3: Validate — duplicate member name shows error ────────────────────────
- tapOn:
    text: "Add member"
- waitForAnimationToEnd:
    timeout: 1000
- tapOn:
    text: "Enter member name"
- inputText: "Alice"

- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Create Group"
    optional: true

- assertVisible:
    text: "Duplicate member names detected"

# ── Fix the duplicate: replace "Alice" duplicate with "Charlie" ───────────────
- clearText
- inputText: "Charlie"

# ── Submit the group ─────────────────────────────────────────────────────────
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Create Group"
    optional: true

- waitForAnimationToEnd:
    timeout: 5000

# ── CA14: Verify group appears on the Home screen ────────────────────────────
- assertVisible:
    text: "Weekend Trip"

- takeScreenshot: "scenario1_group_created"

