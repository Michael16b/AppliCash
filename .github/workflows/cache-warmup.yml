name: Cache Warm-up

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
  workflow_run:
    workflows: [ "Android CI" ]
    branches: [ "main" ]
    types: [ completed ]

permissions:
  contents: read
  actions: write

jobs:
  warmup-lint:
    name: Warm-up KtLint cache
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle wrapper
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper
          key: gradle-wrapper-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          cache-cleanup: on-success

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Warm-up KtLint
        run: ./gradlew ktlintCheck --no-daemon --no-configuration-cache --build-cache --parallel --console=plain

  warmup-build:
    name: Warm-up Build cache
    runs-on: ubuntu-latest
    needs: warmup-lint
    if: ${{ always() && (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success') }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle wrapper
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper
          key: gradle-wrapper-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          cache-cleanup: on-success

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Warm-up Build & Test cache
        run: ./gradlew assembleDebug testDebugUnitTest --build-cache --configuration-cache --parallel --console=plain
