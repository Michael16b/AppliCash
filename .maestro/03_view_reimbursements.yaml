appId: fr.univ.nantes.archi
name: "Scenario 3 - View suggested reimbursements"
tags:
  - rg6
  - rg7
  - ca14
  - ca15
  - ca16

# ── Business rules verified ──────────────────────────────────────────────────
# RG6:  Reimbursement algorithm minimises the number of transactions
# RG7:  Positive balance = credit (to receive), negative = debt (to pay)
# RG10: Balances calculated from all group expenses

---

# ── Setup: continue from previous state ──────────────────────────────────────
- launchApp:
    clearState: false

- waitForAnimationToEnd:
    timeout: 5000

# ── Navigate into the "Weekend Trip" group ─────────────────────────────────────
- tapOn:
    text: "Weekend Trip"

- waitForAnimationToEnd:
    timeout: 3000

# ── Navigate to the Balances tab ──────────────────────────────────────────────
- tapOn:
    text: "Soldes"

- waitForAnimationToEnd:
    timeout: 2000

- assertVisible:
    text: "Soldes des membres"

- takeScreenshot: "scenario3_balances_tab"

# ── RG7: Verify balance labels (positive = receive, negative = pay) ───────────
- assertVisible:
    text: "doit recevoir"
    optional: true

- assertVisible:
    text: "doit rembourser"
    optional: true

# CA17: Handle case where all balances are zero
- assertVisible:
    text: "Tout le monde est à l'équilibre ✓"
    optional: true

# ── RG6: Verify "Suggested reimbursements" section ───────────────────────────
- assertVisible:
    text: "Remboursements suggérés"

- takeScreenshot: "scenario3_suggested_reimbursements"

# ── RG6: Verify at most n-1 transactions for n participants ───────────────────
# With 3 participants (Alice, Bob, Charlie) there should be at most 2 reimbursements
# We verify the "doit payer à" text appears (individual reimbursement row)
- assertVisible:
    text: "doit payer à"
    optional: true

# ── Verify "No reimbursements needed" when all settled ────────────────────────
- assertVisible:
    text: "Aucun remboursement nécessaire"
    optional: true

- takeScreenshot: "scenario3_reimbursements_detail"

# ── Navigate back to confirm back-stack works ─────────────────────────────────
- back

- waitForAnimationToEnd:
    timeout: 2000

- assertVisible:
    text: "AppliCash"
